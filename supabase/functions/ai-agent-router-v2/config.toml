# ai-agent-router-v2: chamado por whatsapp-webhook (interno) via fetch quando
# o agente da linha tem engine='single_agent_v2' (Patricia).
# verify_jwt = false porque a chamada interna passa service_role no header
# Authorization; o Supabase Edge Runtime rejeita JWTs antigos vs keys novas
# (sb_secret_*) e bloqueia a chamada com UNAUTHORIZED_INVALID_JWT_FORMAT.
# O roteador valida tudo que importa: agente ativo, routing_filter, whitelist.
[auth]
verify_jwt = false
