name: E2E Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: e2e-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read

jobs:
  e2e:
    name: Playwright E2E contra preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (Playwright)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Instalar deps do sistema (se cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Lê a URL do preview pelos Deployments do GitHub (que o Vercel popula automaticamente).
      # Não depende do token do Vercel — que estava expirando e fazia o passo antigo falhar
      # sempre no "esperar preview". O GitHub guarda environment_url + state=success do preview.
      - name: Aguardar preview Vercel (via GitHub Deployments)
        id: wait-preview
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const deadline = Date.now() + 10 * 60 * 1000;
            core.info(`Aguardando preview para sha=${sha}...`);
            while (Date.now() < deadline) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                per_page: 50,
              });
              for (const dep of deployments) {
                if (!/preview/i.test(dep.environment || '')) continue;
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: dep.id,
                  per_page: 30,
                });
                const latest = statuses.data[0];
                if (latest && latest.state === 'success' && (latest.environment_url || latest.target_url)) {
                  const url = latest.environment_url || latest.target_url;
                  core.info(`Preview pronto: ${url}`);
                  core.setOutput('url', url);
                  return;
                }
              }
              core.info('preview ainda não pronto, aguardando 10s...');
              await sleep(10000);
            }
            core.setFailed('Preview Vercel não ficou pronto em 10 minutos');

      - name: Rodar testes E2E
        env:
          CI: 'true'
          BASE_URL: ${{ steps.wait-preview.outputs.url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:e2e

      - name: Upload relatório (sempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces (só falhas)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-pr-${{ github.event.pull_request.number }}
          path: test-results/
          retention-days: 14
